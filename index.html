<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtudes — PUC Minas · CMAEE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFBF5;
            --card: #FFFFFF;
            --primary: #E8572A;
            --primary-glow: #FF7E55;
            --primary-bg: #FFF2EC;
            --success: #22C55E;
            --success-bg: #ECFDF5;
            --error: #EF4444;
            --error-bg: #FEF2F2;
            --blue: #3B82F6;
            --blue-bg: #EFF6FF;
            --purple: #8B5CF6;
            --purple-bg: #F5F3FF;
            --amber: #F59E0B;
            --amber-bg: #FFFBEB;
            --teal: #14B8A6;
            --teal-bg: #F0FDFA;
            --pink: #EC4899;
            --pink-bg: #FDF2F8;
            --text: #1E293B;
            --text-mid: #475569;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --radius: 18px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 16px rgba(0,0,0,0.07);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Baloo 2', cursive;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-glow) 50%, var(--amber) 100%);
            padding: 28px 20px 24px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .app-header::after {
            content:''; position:absolute; bottom:-20px; left:0; right:0; height:40px;
            background: var(--bg); border-radius: 50% 50% 0 0;
        }
        .app-header h1 {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            text-shadow: 2px 3px 0 rgba(0,0,0,0.12);
            position: relative; z-index:1;
        }
        .app-header .tagline { font-size:1.05rem; font-weight:600; opacity:.92; margin-top:4px; position:relative; z-index:1; }
        .app-header .inst { font-size:.78rem; opacity:.7; margin-top:8px; position:relative; z-index:1; }
        .header-shape { position:absolute; border-radius:50%; opacity:.12; z-index:0; }
        .hs1 { width:120px;height:120px;background:#fff;top:-30px;left:-20px; }
        .hs2 { width:80px;height:80px;background:#fff;top:10px;right:30px; }
        .hs3 { width:50px;height:50px;background:#000;bottom:20px;left:40%; }

        /* PROGRESS */
        .progress-wrap {
            background: var(--card); padding:12px 20px; box-shadow:var(--shadow-sm);
            position:sticky; top:0; z-index:200; border-bottom:1px solid var(--border);
        }
        .progress-inner { max-width:760px; margin:0 auto; display:flex; align-items:center; gap:12px; }
        .progress-label { font-weight:700; font-size:.9rem; color:var(--primary); white-space:nowrap; }
        .progress-track { flex:1; height:12px; background:#F1E8E0; border-radius:10px; overflow:hidden; }
        .progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),var(--amber)); border-radius:10px; transition:width .6s cubic-bezier(.4,0,.2,1); width:0%; }
        .progress-stars { font-size:1.1rem; font-weight:700; white-space:nowrap; }

        /* SCREENS */
        .screen { display:none; max-width:820px; margin:0 auto; padding:28px 16px 60px; }
        .screen.active { display:block; animation: screenIn .45s ease; }
        @keyframes screenIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

        /* BUTTONS */
        .btn {
            display:inline-flex; align-items:center; gap:8px;
            padding:14px 32px; border:none; border-radius:50px;
            font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:700;
            cursor:pointer; transition:all .25s ease; letter-spacing:.3px;
        }
        .btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
        .btn:active { transform:translateY(0); }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-glow)); color:#fff; }
        .btn-success { background:linear-gradient(135deg,var(--success),#4ADE80); color:#fff; }
        .nav-buttons { display:flex; justify-content:center; gap:12px; margin-top:22px; flex-wrap:wrap; }

        /* ACTIVITY HEADER */
        .act-head { text-align:center; margin-bottom:24px; }
        .act-badge { display:inline-block; padding:5px 16px; border-radius:50px; font-size:.85rem; font-weight:700; color:#fff; margin-bottom:8px; }
        .act-title { font-family:'Lilita One',cursive; font-size:clamp(1.3rem,3.5vw,1.7rem); }
        .act-desc { font-size:1rem; color:var(--text-mid); margin-top:4px; font-weight:600; }
        .act-difficulty { display:inline-flex; align-items:center; gap:4px; margin-top:6px; font-size:.82rem; font-weight:700; padding:3px 12px; border-radius:50px; }

        /* GENERIC CARD */
        .g-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }

        /* TOAST */
        .toast { display:none; text-align:center; padding:16px 20px; border-radius:14px; margin:16px 0; animation:screenIn .35s ease; }
        .toast.show { display:block; }
        .toast.ok { background:var(--success-bg); border:2px solid var(--success); }
        .toast.no { background:var(--error-bg); border:2px solid var(--error); }
        .toast .t-emoji { font-size:2.2rem; }
        .toast .t-text { font-weight:700; font-size:1.05rem; margin-top:2px; }

        /* MODULE 1 — QUIZ */
        .scene-box { text-align:center; padding:28px 16px 18px; }
        .scene-emojis { font-size:clamp(3.5rem,10vw,6rem); line-height:1.2; }
        .scene-question { padding:16px 20px; text-align:center; font-size:1.1rem; font-weight:700; border-top:2px solid var(--border); }
        .opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
        .opt-btn {
            background:var(--card); border:3px solid var(--border); border-radius:14px;
            padding:18px 10px; text-align:center; cursor:pointer; transition:all .25s ease;
        }
        .opt-btn:hover { border-color:var(--primary); transform:translateY(-2px); box-shadow:var(--shadow); }
        .opt-btn .o-emoji { font-size:2.4rem; display:block; margin-bottom:4px; }
        .opt-btn .o-text { font-weight:700; font-size:.95rem; }
        .opt-btn.correct { border-color:var(--success); background:var(--success-bg); }
        .opt-btn.wrong { border-color:var(--error); background:var(--error-bg); animation:shake .45s ease; }
        .opt-btn.dim { pointer-events:none; opacity:.45; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }

        /* MODULE 2 — MATCH */
        .match-wrap { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
        .match-col { flex:1; min-width:250px; }
        .match-col h3 { text-align:center; font-size:1rem; font-weight:700; margin-bottom:10px; padding:8px; border-radius:10px; }
        .match-col.sit h3 { background:var(--blue-bg); color:var(--blue); }
        .match-col.vir h3 { background:var(--purple-bg); color:var(--purple); }
        .m-item {
            background:var(--card); border:3px solid var(--border); border-radius:12px;
            padding:14px; margin-bottom:8px; text-align:center; cursor:pointer;
            transition:all .25s ease; user-select:none;
        }
        .m-item:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
        .m-item .mi-emoji { font-size:2rem; display:block; margin-bottom:2px; }
        .m-item .mi-text { font-weight:700; font-size:.9rem; }
        .m-item.sel { border-color:var(--blue); background:var(--blue-bg); }
        .m-item.ok { border-color:var(--success); background:var(--success-bg); pointer-events:none; }
        .m-item.bad { border-color:var(--error); background:var(--error-bg); animation:shake .4s ease; }

        /* MODULE 3 — SORT */
        .sort-card { text-align:center; padding:24px; }
        .sort-card .s-emoji { font-size:clamp(3rem,9vw,5rem); }
        .sort-card .s-text { font-weight:700; font-size:1.05rem; margin-top:6px; }
        .sort-counter { text-align:center; font-weight:700; font-size:.9rem; color:var(--text-light); margin-bottom:14px; }
        .buckets { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:16px 0; }
        .bucket {
            border:3px dashed var(--border); border-radius:16px; padding:20px 12px;
            text-align:center; cursor:pointer; transition:all .25s ease;
            display:flex; flex-direction:column; align-items:center; gap:4px;
        }
        .bucket:hover { border-color:var(--primary); background:var(--primary-bg); }
        .bucket .bk-emoji { font-size:2.2rem; }
        .bucket .bk-label { font-weight:800; font-size:.95rem; }
        .bucket.bk-ok { border-color:var(--success); background:var(--success-bg); border-style:solid; }
        .bucket.bk-no { border-color:var(--error); background:var(--error-bg); animation:shake .4s ease; }

        /* MODULE 4 — BUILD */
        .build-target { text-align:center; padding:22px; }
        .build-target .bt-emoji { font-size:3.2rem; }
        .build-target .bt-name { font-family:'Lilita One',cursive; font-size:1.5rem; color:var(--teal); }
        .build-target .bt-inst { font-weight:600; color:var(--text-mid); margin-top:4px; }
        .build-collected { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; min-height:48px; margin:12px 0; }
        .build-collected .bc-item {
            font-size:1.8rem; background:var(--success-bg); border:2px solid var(--success);
            border-radius:10px; padding:6px 10px; animation:screenIn .3s ease;
        }
        .build-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin:14px 0; }
        .b-card {
            background:var(--card); border:3px solid var(--border); border-radius:14px;
            padding:16px 10px; text-align:center; cursor:pointer; transition:all .25s ease;
        }
        .b-card:hover { border-color:var(--teal); transform:translateY(-2px); box-shadow:var(--shadow); }
        .b-card .bc-emoji { font-size:2.4rem; display:block; margin-bottom:4px; }
        .b-card .bc-text { font-weight:700; font-size:.85rem; }
        .b-card.picked { border-color:var(--success); background:var(--success-bg); pointer-events:none; }
        .b-card.wrong-pick { border-color:var(--error); background:var(--error-bg); animation:shake .4s ease; }

        /* MODULE 5 — IMAGE HASHTAG */
        .img-scene {
            position:relative; width:100%; aspect-ratio:16/10; overflow:hidden;
            border-radius:var(--radius) var(--radius) 0 0;
            background:#f1f5f9; display:flex; align-items:center; justify-content:center;
        }
        .img-scene img { width:100%; height:100%; object-fit:cover; transition:opacity .4s; }
        .img-scene .img-loader { position:absolute; font-size:2.5rem; animation:spin 1.2s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .img-credit {
            font-size:.7rem; color:var(--text-light); text-align:right; padding:4px 12px;
            background:rgba(255,255,255,.85); position:absolute; bottom:0; right:0; border-radius:8px 0 0 0;
        }
        .img-credit a { color:var(--text-mid); }
        .hashtag-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0; }
        .hash-btn {
            background:var(--card); border:3px solid var(--border); border-radius:14px;
            padding:16px 10px; text-align:center; cursor:pointer; transition:all .25s ease;
            font-weight:700; font-size:1rem; color:var(--purple);
        }
        .hash-btn:hover { border-color:var(--purple); background:var(--purple-bg); transform:translateY(-2px); }
        .hash-btn.correct { border-color:var(--success); background:var(--success-bg); color:var(--success); animation:pop .4s ease; }
        .hash-btn.wrong { border-color:var(--error); background:var(--error-bg); color:var(--error); animation:shake .4s ease; }
        .hash-btn.dim { pointer-events:none; opacity:.4; }

        /* MODULE 6 — STORY */
        .story-panel { padding:24px; text-align:center; }
        .story-scene-emoji { font-size:clamp(3rem,8vw,5rem); margin-bottom:8px; }
        .story-narration { font-size:1.1rem; font-weight:600; line-height:1.6; margin-bottom:4px; }
        .story-prompt { font-size:1rem; font-weight:700; color:var(--pink); margin-top:8px; }
        .story-opts { display:grid; grid-template-columns:1fr; gap:10px; margin:16px auto; max-width:500px; }
        .story-opt {
            background:var(--card); border:3px solid var(--border); border-radius:14px;
            padding:16px; cursor:pointer; transition:all .25s ease;
            display:flex; align-items:center; gap:12px;
        }
        .story-opt:hover { border-color:var(--pink); transform:translateY(-2px); box-shadow:var(--shadow); }
        .story-opt .so-emoji { font-size:2rem; flex-shrink:0; }
        .story-opt .so-text { font-weight:700; font-size:.95rem; text-align:left; }
        .story-opt.s-correct { border-color:var(--success); background:var(--success-bg); }
        .story-opt.s-wrong { border-color:var(--error); background:var(--error-bg); animation:shake .4s ease; }
        .story-opt.s-dim { pointer-events:none; opacity:.4; }
        .story-progress-dots { display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
        .story-dot { width:14px; height:14px; border-radius:50%; background:var(--border); transition:all .3s; }
        .story-dot.done { background:var(--success); }
        .story-dot.current { background:var(--pink); transform:scale(1.3); }

        /* WELCOME & FINAL */
        .welcome-card,.final-card { text-align:center; padding:36px 24px; }
        .welcome-card h2,.final-card h2 { font-family:'Lilita One',cursive; font-size:1.8rem; color:var(--primary); margin:10px 0; }
        .welcome-hero { font-size:4.5rem; animation:bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .module-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin:20px 0; }
        .module-preview { background:var(--bg); border-radius:14px; padding:14px 8px; text-align:center; }
        .module-preview .mp-emoji { font-size:2rem; display:block; margin-bottom:2px; }
        .module-preview .mp-name { font-weight:700; font-size:.8rem; }
        .module-preview .mp-diff { font-size:.7rem; font-weight:600; }
        .final-trophy { font-size:5rem; animation:bounce 1.5s ease-in-out infinite; }
        .virtues-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(95px,1fr)); gap:10px; margin:20px 0; }
        .vb { background:var(--primary-bg); border-radius:12px; padding:12px 6px; text-align:center; }
        .vb .vb-e { font-size:1.8rem; display:block; }
        .vb .vb-n { font-weight:700; font-size:.78rem; color:var(--primary); }

        /* CONFETTI */
        .confetti-box { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
        .confetti-bit { position:absolute; font-size:1.4rem; animation:fall 3s ease-in forwards; }
        @keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

        @media (max-width:520px) {
            .opts-grid,.buckets,.hashtag-grid { grid-template-columns:1fr; }
            .match-wrap { flex-direction:column; }
            .build-grid { grid-template-columns:1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="header-shape hs1"></div>
    <div class="header-shape hs2"></div>
    <div class="header-shape hs3"></div>
    <h1>🌟 Virtudes 🌟</h1>
    <div class="tagline">Aprenda o que é bom, certo e bonito!</div>
    <div class="inst">PUC Minas · CMAEE Dr. Tarso de Coimbra</div>
</div>

<div class="progress-wrap">
    <div class="progress-inner">
        <span class="progress-label" id="pLabel">0 / 6</span>
        <div class="progress-track"><div class="progress-bar" id="pBar"></div></div>
        <span class="progress-stars" id="pStars">⭐ 0</span>
    </div>
</div>

<div id="app"></div>
<div class="confetti-box" id="confettiBox"></div>

<script>
/* ============================================================
   UTILITIES
   ============================================================ */
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function confetti() {
    const box = document.getElementById('confettiBox');
    const es = ['⭐','🌟','✨','🎉','💛','💚','💙','❤️','🧡','💜'];
    for (let i = 0; i < 28; i++) {
        const d = document.createElement('div');
        d.className = 'confetti-bit';
        d.textContent = es[Math.floor(Math.random()*es.length)];
        d.style.left = Math.random()*100+'%';
        d.style.animationDelay = Math.random()*1+'s';
        d.style.animationDuration = (2+Math.random()*2)+'s';
        box.appendChild(d);
    }
    setTimeout(()=>{ box.innerHTML=''; }, 4000);
}

function toast(id, eid, tid, ok, msg) {
    const el = document.getElementById(id);
    document.getElementById(eid).textContent = ok ? '🎉' : '😕';
    document.getElementById(tid).textContent = msg;
    el.className = 'toast show ' + (ok ? 'ok' : 'no');
}

/* ============================================================
   STATE
   ============================================================ */
const TOTAL_MODULES = 6;
let stars = 0;
let modulesCompleted = 0;
let currentScreen = 'welcome';
const app = document.getElementById('app');

function updateProgress() {
    document.getElementById('pBar').style.width = (modulesCompleted/TOTAL_MODULES*100)+'%';
    document.getElementById('pLabel').textContent = modulesCompleted+' / '+TOTAL_MODULES;
    document.getElementById('pStars').textContent = '⭐ '+stars;
}

function showScreen(id) {
    currentScreen = id;
    window.scrollTo({top:0,behavior:'smooth'});
    const fn = {welcome:renderWelcome, mod1:initMod1, mod2:initMod2, mod3:initMod3, mod4:initMod4, mod5:initMod5, mod6:initMod6, final:renderFinal};
    if (fn[id]) fn[id]();
}

/* ============================================================
   WELCOME
   ============================================================ */
function renderWelcome() {
    app.innerHTML = `
    <div class="screen active">
        <div class="g-card welcome-card">
            <div class="welcome-hero">👋</div>
            <h2>Bem-vindo!</h2>
            <p style="font-size:1.1rem;line-height:1.6;">Vamos aprender sobre <strong>VIRTUDES</strong>.<br>Virtudes = coisas boas que fazemos! 💪❤️</p>
            <div class="module-list">
                <div class="module-preview"><span class="mp-emoji">🔍</span><span class="mp-name">Qual virtude?</span><span class="mp-diff" style="color:var(--success)">⭐ Fácil</span></div>
                <div class="module-preview"><span class="mp-emoji">🔗</span><span class="mp-name">Ligar</span><span class="mp-diff" style="color:var(--success)">⭐ Fácil</span></div>
                <div class="module-preview"><span class="mp-emoji">✅❌</span><span class="mp-name">Certo/Errado</span><span class="mp-diff" style="color:var(--amber)">⭐⭐ Médio</span></div>
                <div class="module-preview"><span class="mp-emoji">🧩</span><span class="mp-name">Montar</span><span class="mp-diff" style="color:var(--amber)">⭐⭐ Médio</span></div>
                <div class="module-preview"><span class="mp-emoji">📸</span><span class="mp-name">Foto + #</span><span class="mp-diff" style="color:var(--primary)">⭐⭐⭐ Difícil</span></div>
                <div class="module-preview"><span class="mp-emoji">📖</span><span class="mp-name">História</span><span class="mp-diff" style="color:var(--primary)">⭐⭐⭐ Difícil</span></div>
            </div>
            <p style="font-size:.95rem;color:var(--text-mid);">6 atividades · Clique nas respostas!</p>
            <div class="nav-buttons"><button class="btn btn-primary" onclick="showScreen('mod1')">COMEÇAR ▶️</button></div>
        </div>
    </div>`;
}

/* ============================================================
   MODULE 1 — QUIZ: Qual é a virtude? (FÁCIL)
   ============================================================ */
const mod1Data = [
    { scene:'👦➡️🧓💺', bg:'linear-gradient(135deg,#EBF5FB,#D6EAF8)',
      q:'Um jovem dá o lugar para um idoso. Qual virtude?',
      opts:[{e:'💛',t:'Respeito',ok:true},{e:'💰',t:'Ganância'},{e:'😡',t:'Raiva'},{e:'😴',t:'Preguiça'}] },
    { scene:'👩‍🦯🚶‍♀️🤝🚶', bg:'linear-gradient(135deg,#FEF9E7,#FCF3CF)',
      q:'Alguém ajuda uma pessoa a atravessar a rua. Qual virtude?',
      opts:[{e:'🤥',t:'Mentira'},{e:'🤝',t:'Generosidade',ok:true},{e:'😤',t:'Egoísmo'},{e:'🙈',t:'Indiferença'}] },
    { scene:'👧📱✋😊', bg:'linear-gradient(135deg,#F4ECF7,#E8DAEF)',
      q:'Uma menina acha um celular e devolve ao dono. Qual virtude?',
      opts:[{e:'💪',t:'Coragem'},{e:'🎭',t:'Falsidade'},{e:'🤞',t:'Honestidade',ok:true},{e:'😏',t:'Esperteza'}] },
    { scene:'🧒😢➡️🧒🤗', bg:'linear-gradient(135deg,#E8F8F5,#D1F2EB)',

        { scene:'👬😊⚽🏫', narration:'O aluno novo fez muitos amigos!', prompt:'Qual virtude fez a diferença?',
          opts:[{e:'🫂',t:'Empatia e acolhimento',ok:true,virtue:'Empatia'},{e:'😤',t:'Competição'},{e:'🤷',t:'Indiferença'}] }
    ]},
    { title:'A árvore do bairro', steps:[
        { scene:'🌳😢🪓🏗️', narration:'A prefeitura quer derrubar a árvore do bairro.', prompt:'Os moradores devem:',
          opts:[{e:'📢',t:'Conversar com a prefeitura',ok:true,virtue:'Coragem'},{e:'🤷',t:'Não fazer nada'},{e:'😡',t:'Quebrar as máquinas'}] },
        { scene:'🗣️🏛️📝🌳', narration:'Os moradores conversam com respeito e fazem abaixo-assinado.', prompt:'Que virtude praticam?',
          opts:[{e:'🕊️',t:'Diálogo pacífico',ok:true,virtue:'Paz'},{e:'😡',t:'Agressividade'},{e:'😴',t:'Passividade'}] },
        { scene:'🌳✅🏗️🔄😊', narration:'A prefeitura aceita mudar o projeto! Todos comemoram!', prompt:'O que aprendemos?',
          opts:[{e:'💪',t:'Coragem e diálogo mudam o mundo',ok:true,virtue:'Coragem + Paz'},{e:'🤷',t:'Não vale lutar'},{e:'😡',t:'Violência é a solução'}] }
    ]}
];
let m6si=0, m6stepi=0, m6score=0;

function initMod6() { m6si=0; m6stepi=0; m6score=0; renderMod6(); }

function renderMod6() {
    const story=mod6Stories[m6si], step=story.steps[m6stepi];
    const opts=shuffle(step.opts);
    const dots=story.steps.map((_,i)=>`<div class="story-dot${i<m6stepi?' done':''}${i===m6stepi?' current':''}"></div>`).join('');
    app.innerHTML = `
    <div class="screen active">
        <div class="act-head">
            <div class="act-badge" style="background:var(--primary)">MÓDULO 6 de 6</div>
            <div class="act-title">📖 ${story.title}</div>
            <div class="act-desc">Escolha a melhor ação!</div>
            <div class="act-difficulty" style="background:var(--primary-bg);color:var(--primary)">⭐⭐⭐ Difícil</div>
        </div>
        <div class="story-progress-dots">${dots}</div>
        <div class="g-card story-panel">
            <div class="story-scene-emoji">${step.scene}</div>
            <div class="story-narration">${step.narration}</div>
            <div class="story-prompt">${step.prompt}</div>
        </div>
        <div class="story-opts" id="m6opts">
            ${opts.map(o=>`<div class="story-opt" data-ok="${!!o.ok}" data-virtue="${o.virtue||''}" data-text="${o.t}" onclick="m6Ans(this)">
                <span class="so-emoji">${o.e}</span><span class="so-text">${o.t}</span></div>`).join('')}
        </div>
        <div class="toast" id="m6toast"><div class="t-emoji" id="m6te"></div><div class="t-text" id="m6tt"></div></div>
        <div class="nav-buttons" id="m6nav" style="display:none;"><button class="btn btn-primary" onclick="m6Next()">PRÓXIMO ▶️</button></div>
        <div style="text-align:center;margin-top:8px;font-size:.85rem;color:var(--text-light);">História ${m6si+1} de ${mod6Stories.length}</div>
    </div>`;
}

function m6Ans(el) {
    const all=document.querySelectorAll('#m6opts .story-opt');
    all.forEach(b=>{b.classList.add('s-dim'); if(b.dataset.ok==='true') b.classList.add('s-correct');});
    el.classList.remove('s-dim');
    if(el.dataset.ok==='true') {
        m6score++; stars++;
        const vt=el.dataset.virtue?' — '+el.dataset.virtue:'';
        toast('m6toast','m6te','m6tt',true,'Boa escolha! ⭐'+vt); confetti();
    } else { el.classList.add('s-wrong'); const r=[...all].find(b=>b.dataset.ok==='true');
        toast('m6toast','m6te','m6tt',false,'Melhor opção: '+r.dataset.text); }
    updateProgress(); document.getElementById('m6nav').style.display='flex';
}

function m6Next() {
    m6stepi++;
    if(m6stepi<mod6Stories[m6si].steps.length) { renderMod6(); }
    else { m6si++; m6stepi=0;
        if(m6si<mod6Stories.length) renderMod6();
        else { modulesCompleted++; updateProgress(); showScreen('final'); }
    }
}

/* ============================================================
   FINAL
   ============================================================ */
function renderFinal() {
    const maxStars = mod1Data.length + mod2Data.length + mod3Data.length + mod4Rounds.length*3 + mod5Data.length + mod6Stories.reduce((s,st)=>s+st.steps.length,0);
    const pct=stars/maxStars;
    const sd=pct>=.8?'⭐⭐⭐':pct>=.5?'⭐⭐':'⭐';
    app.innerHTML = `
    <div class="screen active">
        <div class="g-card final-card">
            <div class="final-trophy">🏆</div>
            <h2>Parabéns!</h2>
            <div style="font-size:1.3rem;font-weight:700;margin:8px 0;">⭐ ${stars} de ${maxStars} estrelas</div>
            <div style="font-size:2.5rem;margin:8px 0;">${sd}</div>
            <p style="font-size:1.1rem;margin:10px 0;">Você completou TODAS as atividades! 🎉</p>
            <p style="font-size:1rem;color:var(--text-mid);">Praticar virtudes faz o mundo melhor! 🌍❤️</p>
            <div class="virtues-grid">
                <div class="vb"><span class="vb-e">🤝</span><span class="vb-n">Generosidade</span></div>
                <div class="vb"><span class="vb-e">💛</span><span class="vb-n">Respeito</span></div>
                <div class="vb"><span class="vb-e">💪</span><span class="vb-n">Coragem</span></div>
                <div class="vb"><span class="vb-e">⚖️</span><span class="vb-n">Justiça</span></div>
                <div class="vb"><span class="vb-e">🕊️</span><span class="vb-n">Paz</span></div>
                <div class="vb"><span class="vb-e">🫂</span><span class="vb-n">Empatia</span></div>
                <div class="vb"><span class="vb-e">🤞</span><span class="vb-n">Honestidade</span></div>
                <div class="vb"><span class="vb-e">⏳</span><span class="vb-n">Paciência</span></div>
                <div class="vb"><span class="vb-e">❤️</span><span class="vb-n">Compaixão</span></div>
                <div class="vb"><span class="vb-e">🙏</span><span class="vb-n">Gratidão</span></div>
            </div>
            <div class="nav-buttons"><button class="btn btn-success" onclick="stars=0;modulesCompleted=0;updateProgress();showScreen('welcome')">🔄 JOGAR DE NOVO</button></div>
        </div>
    </div>`;
    confetti(); setTimeout(confetti,1500);
}

/* BOOT */
updateProgress();
showScreen('welcome');
</script>
</body>
</html>
